spring.application.name=USERSERVICEMicroservicesProject
server.port=8081
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Here this is used to connect with he eureka  server 
eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=http://localhost:8084/eureka/



#  25 Configuration for  the Circuit Breaker

management.health.circuitbreakers.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
resilience4j.circuitbreaker.instances.ratingHotelBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.ratingHotelBreaker.eventConsumerBufferSize=10
resilience4j.circuitbreaker.instances.ratingHotelBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.ratingHotelBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.ratingHotelBreaker.automaticTransitionFromOpenToHalfOpenEnabled=true
resilience4j.circuitbreaker.instances.ratingHotelBreaker.waitDurationInOpenState=6s
resilience4j.circuitbreaker.instances.ratingHotelBreaker.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.ratingHotelBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.ratingHotelBreaker.slidingWindowType=COUNT_BASED


   #     Retry Configuration
   
resilience4j.retry.ratingHotelService.max-attempts=3
resilience4j.retry.ratingHotelService.wait-suration=3s


    #    Rate Limiter configuration
  
resilience4j.ratelimiter.instances.userRateLimiter.limit-refresh-period=4s
resilience4j.ratelimiter.instances.userRateLimiter.limit-for-period=2
resilience4j.ratelimiter.instances.userRateLimiter.timeout-duration=2s



# ===================================================================
# Auth0 Security Configuration (Replaces Okta)
# ===================================================================

# 1. Resource Server (Validating Incoming Requests from Gateway)
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dev-ct5zyexu116qnz7b.us.auth0.com/
spring.security.oauth2.resourceserver.jwt.audiences=https://my-internal-api

# 2. Client Registration (For Inter-Service Communication via Feign/RestTemplate)
spring.security.oauth2.client.registration.my-internal-client.provider=auth0
spring.security.oauth2.client.registration.my-internal-client.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.my-internal-client.client-id=
spring.security.oauth2.client.registration.my-internal-client.client-secret=

# 3. Identity Provider Details
spring.security.oauth2.client.provider.auth0.issuer-uri=https://dev-ct5zyexu116qnz7b.us.auth0.com/
